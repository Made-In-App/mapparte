; PHP Configuration for WordPress/WooCommerce Development
; Memory and execution settings
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
post_max_size = 100M
upload_max_filesize = 100M
max_file_uploads = 20

; Error reporting for development
display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_NOTICE & ~E_WARNING
log_errors = On
error_log = /var/log/php_errors.log

; Session settings
session.gc_maxlifetime = 1440
session.cookie_lifetime = 0
session.cookie_httponly = 1
session.use_strict_mode = 1

; File uploads
file_uploads = On
upload_tmp_dir = /tmp

; Date and time
date.timezone = Europe/Rome

; Security settings
expose_php = Off
allow_url_fopen = On
allow_url_include = Off

; OPcache settings for performance
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 2
opcache.fast_shutdown = 1
opcache.enable_file_override = 1
opcache.validate_timestamps = 1

; MySQL settings
mysqli.allow_persistent = On
mysqli.max_persistent = 10
mysqli.max_links = -1
mysqli.cache_size = 2000
mysqli.default_port = 3306
mysqli.reconnect = Off

; GD settings
gd.jpeg_ignore_warning = 1

; Mail settings (if needed)
sendmail_path = /usr/sbin/sendmail -t -i

; Additional settings for WooCommerce
auto_detect_line_endings = On

; PHP 8.4 compatibility settings
zend.exception_ignore_args = 1
zend.exception_string_param_max_len = 0

; PHP 8.4 specific optimizations
opcache.jit = 1235
opcache.jit_buffer_size = 128M

; Redis Configuration (commented out to avoid conflicts)
; redis.session.locking_enabled = 1
; redis.session.lock_expire = 10
; redis.session.lock_wait_time = 2000
; redis.session.lock_retries = 10

; Suppress specific WordPress/Plugin warnings
ignore_repeated_errors = On
ignore_repeated_source = On
